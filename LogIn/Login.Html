<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSU - Log in</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Login.css">
</head>
<body>
    <main class="login-container">
        <!-- Left Column: Branding -->
        <section class="branding-section">
            <div class="branding-content">
                <div class="vertical-text">
                    <div class="letter-group">
                        <span class="letter">J</span>
                        <span class="word">Jessa</span>
                    </div>
                    <div class="letter-group">
                        <span class="letter">S</span>
                        <span class="word">State</span>
                    </div>
                    <div class="letter-group">
                        <span class="letter">U</span>
                        <span class="word">University</span>
                    </div>
                </div>
                <p class="mission-text">Knowledge,<br>leadership, Service</p>
            </div>
        </section>

        <!-- Right Column: Authentication -->
        <section class="auth-section">
            <div class="auth-content">
                <div class="logo-container">
                    <img src="../SchoolLogo.png" alt="School Logo" class="logo-img">
                </div>

                <div class="login-card">
                    <h1 class="card-title">Log-in Form</h1>
                    
                    <form id="loginForm" class="login-form">
                        <div class="input-wrapper">
                            <label for="username" class="sr-only">Username or Email</label>
                            <div class="input-group">
                                <span class="icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                </span>
                                <input type="text" id="username" name="username" placeholder="Username or Email">
                            </div>
                            <div class="error-message" id="usernameError">Username is required</div>
                        </div>

                        <div class="input-wrapper">
                            <label for="password" class="sr-only">Password</label>
                            <div class="input-group">
                                <span class="icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                                </span>
                                <input type="password" id="password" name="password" placeholder="Password">
                                <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                </button>
                            </div>
                            <div class="error-message" id="passwordError">Password is required</div>
                        </div>

                        <div class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Remember me</label>
                        </div>

                        <div class="form-actions">
                            <a href="#" id="forgotPasswordLink" class="forgot-link">Forgot Password?</a>
                            <button type="submit" class="submit-btn" id="loginBtn">
                                <span class="btn-text">Log in</span>
                                <span class="spinner" id="loginSpinner" style="display: none;"></span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="Login.js"></script>
</body>
</html>
